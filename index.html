<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tip Calculator</h1>
        <form id="tipForm">
            <label for="billTotal">Bill Total ($):</label>
            <input type="text" id="billTotal" name="billTotal">

            <label for="billWithTax">Total Bill with Tax (11%):</label>
            <input type="text" id="billWithTax" disabled>

            <label for="currency">Select Currency:</label>
            <select id="currency">
                <option value="usd">US Dollars ($)</option>
                <option value="eur">EUROS</option>
                <option value="inr">Rupees</option>
            </select>

            <label for="tipRange">Tip (%)</label>
            <input type="range" id="tipRange" min="0" max="100" value="0">

            <label for="tipPercent">Tip Percentage:</label>
            <input type="text" id="tipPercent" disabled>

            <label for="tipAmount">Tip Amount:</label>
            <input type="text" id="tipAmount" disabled>

            <label for="totalWithTip">Total Bill with Tip:</label>
            <input type="text" id="totalWithTip" disabled>

            <label for="convertedTip">Converted Tip Amount:</label>
            <input type="text" id="convertedTip" disabled>

            <label for="convertedTotal">Converted Total Bill with Tip and Tax</label>
            <input type="text" id="convertedTotal" disabled>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
